    <section class="newsletter" id="newsletter">
      <h2 class="section-h2">Join the Ravenfjord Watch</h2>
      <p class="newsletter-p">
        Receive rare sightings, creature updates, and travel warnings from the
        northern realm.
      </p>

      <form
        class="newsletter-form"
        action="https://formsubmit.co/57d09a3776aed8a5a4bc8f5f60aca15b"
        method="POST"
      >
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />

        <label for="firstName">First Name</label>
        <input
          type="text"
          id="firstName"
          name="Förnamn"
          required
          minlength="2"
          pattern="[A-Za-zÅÄÖåäö\- ]+"
          placeholder="First Name"
        />

        <label for="lastName">Last Name</label>
        <input
          type="text"
          id="lastName"
          name="Efternamn"
          required
          minlength="2"
          pattern="[A-Za-zÅÄÖåäö\- ]+"
          placeholder="Last Name"
        />

        <label for="email">Age</label>
        <input
          type="number"
          placeholder="Age"
          name="age"
          min="18"
          max="100"
          required
        />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="E-post"
          required
          pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
          placeholder="name@example.com"
        />
        <button type="submit">Subscribe</button>
      </form>
    </section>
